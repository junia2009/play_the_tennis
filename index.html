<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tennis Web Game</title>
<link rel="manifest" href="/play_the_tennis/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%232e7d32'/%3E%3Ccircle cx='90' cy='90' r='56' fill='%23dfff5e' stroke='%23fff' stroke-width='4'/%3E%3Cpath d='M40 90 Q90 56 140 90' fill='none' stroke='%23fff' stroke-width='4'/%3E%3Cpath d='M40 90 Q90 124 140 90' fill='none' stroke='%23fff' stroke-width='4'/%3E%3C/svg%3E">
<meta name="theme-color" content="#1b5e20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tennis">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;background:#0a0e14;overflow:hidden;
  font-family:'Helvetica Neue',Arial,sans-serif;color:#fff;
}
#stage{position:fixed;inset:0}
canvas{display:block;touch-action:none}

/* ── スコアバー ─────────────────────────── */
#hud{
  position:fixed;top:0;left:0;right:0;padding:8px 12px;
  background:linear-gradient(180deg,rgba(0,0,0,.85),rgba(0,0,0,.4) 70%,transparent);
  display:flex;justify-content:space-between;align-items:flex-start;
  font-size:12px;z-index:5;pointer-events:none;
}
#hud .col{display:flex;flex-direction:column;gap:2px}
#hud .lbl{color:#90a4ae;font-size:9px;letter-spacing:.6px}
#hud .val{font-weight:700;font-size:13px}
#hud .right{text-align:right}
#hud .meta{color:rgba(255,255,255,.45);font-size:9px;margin-top:1px}
#serveTag{color:#ffd54f;font-weight:700}

/* ── オーバーレイ (タイトル/難易度/結果) ── */
#ov{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(0,20,40,.85),rgba(0,0,8,.96));
  z-index:30;gap:6px;padding:24px;
}
#ov.hidden{display:none}
#ov h1{font-size:clamp(28px,9vw,54px);text-shadow:0 0 18px #4fc3f7;letter-spacing:3px;margin-bottom:2px}
#ov h2{font-size:clamp(11px,3vw,18px);color:#90caf9;margin-bottom:20px;letter-spacing:1px}
.btn{
  background:linear-gradient(135deg,#1565c0,#0d47a1);border:2px solid #42a5f5;
  color:#fff;padding:10px 26px;font-size:clamp(11px,3vw,15px);border-radius:24px;
  cursor:pointer;margin:4px;transition:.15s;letter-spacing:.8px;font-weight:600;
}
.btn:active{transform:scale(.96)}
.btn.sel{background:linear-gradient(135deg,#00796b,#004d40);border-color:#26a69a}
.row{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:6px 0}
.ver{margin-top:14px;color:rgba(255,255,255,.35);font-size:11px;letter-spacing:.5px}

/* ── メッセージバナー ───────────────────── */
#msg{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,16,.94);border:2px solid #42a5f5;border-radius:10px;
  padding:10px 22px;font-size:clamp(11px,3vw,16px);text-align:center;
  z-index:20;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;
}
#msg.on{opacity:1}

/* ── 仮想スティック ──────────────────────── */
#stick{
  position:fixed;left:24px;bottom:30px;width:120px;height:120px;
  border-radius:50%;background:rgba(255,255,255,.06);
  border:2px solid rgba(255,255,255,.35);
  z-index:10;touch-action:none;
}
#knob{
  position:absolute;left:50%;top:50%;width:48px;height:48px;
  border-radius:50%;background:radial-gradient(circle at 35% 35%,#90caf9,#1565c0);
  border:1.5px solid rgba(255,255,255,.6);
  transform:translate(-50%,-50%);pointer-events:none;
  transition:background .15s;
}
#stick.active #knob{background:radial-gradient(circle at 35% 35%,#bbdefb,#1976d2)}

/* ── ショットボタン (右下、ダイヤ配置) ─── */
#shots{
  position:fixed;right:24px;bottom:30px;width:140px;height:140px;
  z-index:10;
}
.sb{
  position:absolute;width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;text-align:center;
  border:1.5px solid rgba(255,255,255,.6);box-shadow:0 2px 8px rgba(0,0,0,.4);
  touch-action:none;line-height:1;
}
.sb.pressed{transform:scale(.88);box-shadow:0 0 12px rgba(255,255,255,.5)}
#sb-lob    {top:0;       left:50%;transform:translate(-50%,0);   background:radial-gradient(circle at 35% 35%,#ce93d8,#7b1fa2)}
#sb-topspin{top:50%;     left:0;  transform:translate(0,-50%);   background:radial-gradient(circle at 35% 35%,#a5d6a7,#2e7d32)}
#sb-slice  {top:100%;    left:50%;transform:translate(-50%,-100%);background:radial-gradient(circle at 35% 35%,#ffcc80,#e65100)}
#sb-flat   {top:50%;     left:100%;transform:translate(-100%,-50%);background:radial-gradient(circle at 35% 35%,#90caf9,#1565c0);width:56px;height:56px;font-size:10px}
#sb-lob.pressed   {transform:translate(-50%,0) scale(.88)}
#sb-topspin.pressed{transform:translate(0,-50%) scale(.88)}
#sb-slice.pressed {transform:translate(-50%,-100%) scale(.88)}
#sb-flat.pressed  {transform:translate(-100%,-50%) scale(.88)}

#controls.hidden{display:none}
#controls.hidden #stick,#controls.hidden #shots{display:none}

/* ── ローディング ───────────────────────── */
#loading{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:#0a0e14;color:#90caf9;font-size:14px;z-index:50;letter-spacing:2px;
}
#loading.hidden{display:none}
</style>
</head>
<body>
<div id="stage"></div>

<div id="hud">
  <div class="col">
    <div class="lbl">GAME</div>
    <div class="val" id="hud-game">0 - 0</div>
    <div class="meta" id="hud-meta">1 SET MATCH</div>
  </div>
  <div class="col">
    <div class="lbl">POINT</div>
    <div class="val" id="hud-point">CPU 0  あなた 0</div>
    <div class="meta" id="hud-tb"></div>
  </div>
  <div class="col right">
    <div class="lbl">SERVE</div>
    <div class="val" id="serveTag">▶ あなたのサーブ</div>
    <div class="meta" id="hud-side">1st | デュースサイド | NORMAL</div>
  </div>
</div>

<div id="controls" class="hidden">
  <div id="stick"><div id="knob"></div></div>
  <div id="shots">
    <div class="sb" id="sb-lob"    >ロブ</div>
    <div class="sb" id="sb-topspin">トップ</div>
    <div class="sb" id="sb-slice"  >スライス</div>
    <div class="sb" id="sb-flat"   >フラット</div>
  </div>
</div>

<div id="msg"></div>

<div id="ov">
  <h1>🎾 TENNIS</h1>
  <h2>Web Game · 3D</h2>
  <div id="oc"></div>
</div>

<div id="loading">LOADING ...</div>


<script type="module" src="/play_the_tennis/js/main.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/play_the_tennis/sw.js').catch(()=>{});
  navigator.serviceWorker.addEventListener('controllerchange', ()=>window.location.reload());
  navigator.serviceWorker.addEventListener('message', e=>{
    if(e.data && e.data.type==='SW_UPDATED') window.location.reload();
  });
}
</script>
</body>
</html>
